<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#ffb95f",
                    "inverse-surface": "#dae2fd",
                    "inverse-primary": "#ee9800",
                    "surface-container": "#171f33",
                    "primary-fixed": "#ffddb8",
                    "tertiary-fixed": "#ffddb8",
                    "surface-dim": "#0b1326",
                    "on-primary-fixed-variant": "#653e00",
                    "primary-fixed-dim": "#ffb95f",
                    "outline": "#948a85",
                    "secondary-fixed-dim": "#ffb95f",
                    "on-primary": "#472a00",
                    "error-container": "#93000a",
                    "error": "#ffb4ab",
                    "on-secondary-container": "#5b3800",
                    "surface-bright": "#31394d",
                    "on-surface-variant": "#cabdbb",
                    "on-primary-container": "#5b3800",
                    "on-secondary-fixed": "#2a1700",
                    "secondary-container": "#ee9800",
                    "inverse-on-surface": "#283044",
                    "on-tertiary": "#472a00",
                    "surface-container-lowest": "#060e20",
                    "on-tertiary-fixed-variant": "#653e00",
                    "on-tertiary-fixed": "#2a1700",
                    "tertiary-fixed-dim": "#ffb95f",
                    "on-error-container": "#ffdad6",
                    "tertiary-container": "#ee9800",
                    "on-tertiary-container": "#5b3800",
                    "tertiary": "#ffb95f",
                    "on-background": "#dae2fd",
                    "surface-variant": "#2d3449",
                    "surface": "#0b1326",
                    "on-error": "#690005",
                    "surface-tint": "#ffb95f",
                    "primary-container": "#ee9800",
                    "surface-container-high": "#222a3d",
                    "primary": "#ffb95f",
                    "on-secondary-fixed-variant": "#653e00",
                    "surface-container-highest": "#2d3449",
                    "outline-variant": "#493c3c",
                    "secondary-fixed": "#ffddb8",
                    "background": "#0b1326",
                    "on-surface": "#dae2fd",
                    "on-secondary": "#472a00",
                    "surface-container-low": "#131b2e",
                    "on-primary-fixed": "#2a1700"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "xs": "0.5rem",
                    "margin": "2rem",
                    "gutter": "1.5rem",
                    "md": "1.5rem",
                    "base": "4px",
                    "lg": "2rem",
                    "sm": "1rem",
                    "xl": "3rem"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "title-sm": ["Inter"],
                    "body-sm": ["Inter"],
                    "display-lg": ["Inter"],
                    "label-caps": ["Inter"],
                    "code": ["monospace"],
                    "headline-md": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "title-sm": ["18px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "code": ["14px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .rim-light {
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hytale-bg {
            background-image: radial-gradient(circle at 20% 30%, rgba(245, 158, 11, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, rgba(245, 158, 11, 0.08) 0%, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden hytale-bg">
<!-- Background Graphics -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-orange-900/30 blur-[120px] rounded-full"></div>
<!-- Abstract Mesh -->
<svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern height="40" id="grid" patternunits="userSpaceOnUse" width="40">
<path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"></path>
</pattern>
</defs>
<rect fill="url(#grid)" height="100%" width="100%"></rect>
</svg>
</div>
<!-- Login Container -->
<main class="z-10 w-full max-w-[420px] px-margin animate-in fade-in zoom-in duration-700">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center shadow-[0_0_30px_rgba(245,158,11,0.3)] mb-md rim-light">
<span class="material-symbols-outlined text-on-primary-container text-[32px]">terminal</span>
</div>
<h1 class="font-display-lg text-headline-md tracking-tighter text-on-surface mb-xs">Hytale Command</h1>
<p class="font-body-sm text-on-surface-variant text-center opacity-80 uppercase tracking-[0.2em] font-bold text-[10px]">Secure Node Access</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-lg shadow-2xl rim-light relative group">
<div class="absolute -inset-px bg-gradient-to-tr from-primary/20 to-transparent rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
<form class="space-y-md relative z-10">
<!-- Username Field -->
<div class="space-y-xs">
<label class="font-label-caps text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]">person</span>
                        Username
                    </label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-white/10 rounded-lg px-md py-sm font-body-md text-on-surface placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary transition-all" placeholder="admin_user" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]">lock</span>
                            Password
                        </label>
<a class="font-label-caps text-primary hover:text-primary-fixed transition-colors" href="#">Forgot Key?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-white/10 rounded-lg px-md py-sm font-body-md text-on-surface placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- MFA (Optional visual hint) -->
<div class="flex items-center gap-sm pt-xs">
<input class="w-4 h-4 rounded bg-surface-container-lowest border-white/10 text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-sm text-on-surface-variant select-none" for="remember">Remember this terminal</label>
</div>
<!-- Login Button -->
<button class="w-full bg-primary py-md rounded-lg font-title-sm text-on-primary hover:bg-primary-fixed hover:shadow-[0_0_20px_rgba(245,158,11,0.4)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-lg shadow-lg" type="submit">
<span>Initialize Session</span>
<span class="material-symbols-outlined text-[18px]">login</span>
</button>
</form>
</div>
<!-- Social/SSO Alternative -->
<div class="mt-lg flex items-center gap-md">
<div class="h-[1px] flex-1 bg-white/5"></div>
<span class="font-label-caps text-slate-600">Enterprise auth</span>
<div class="h-[1px] flex-1 bg-white/5"></div>
</div>
<div class="mt-md flex gap-gutter">
<button class="flex-1 glass-card py-sm rounded-lg font-body-sm text-on-surface hover:bg-white/5 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px]">key</span>
                SSO
            </button>
<button class="flex-1 glass-card py-sm rounded-lg font-body-sm text-on-surface hover:bg-white/5 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px]">shield_person</span>
                LDAP
            </button>
</div>
<!-- Hero Graphic Placeholder (Decorative) -->
<div class="mt-xl opacity-40 hover:opacity-100 transition-opacity duration-1000 cursor-default">
<img class="w-full h-32 object-cover rounded-xl border border-white/5 shadow-2xl mask-fade-edges" data-alt="A high-tech digital interface overlay on a dark abstract background with geometric shapes and lines inspired by Hytale. The scene is illuminated by amber and orange glowing light sources, creating a professional DevOps command center aesthetic. Soft atmospheric fog and floating digital dust particles add depth and a sense of immersion into a gaming server management environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBfasw1gjpj-QiU27Yuqfpj4rwIwtpCshtNnX4tCs1EOtkULVwDNhH8zb0ZP7PUlt4NKpP4uGPhSBwZXP7N2gs8RafI2U7UOK4mnJaqikiWKca3igUG-nI11qR7k_Qd0Msd4j9x6HcMfeWoXpn6p3lGWnBTBd0HSlzAAPpo5CsnmN7kPAJygDpNePGUXZ4cbPo35BFhLlmdN6GHJuqk3SE98ejITc3ezLRsU3OJpEy0OadyXI3Yi7Xxuxa4NglQMg-1orv83fEbdA"/>
<style>
                .mask-fade-edges {
                    mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
                }
            </style>
</div>
</main>
<!-- Footer -->
<footer class="absolute bottom-margin z-10 w-full flex flex-col items-center gap-xs">
<div class="flex items-center gap-gutter font-label-caps text-slate-500">
<span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span> Network Status: Nominal</span>
<span class="w-[1px] h-3 bg-white/10"></span>
<span>Version 1.4.2-LTS</span>
</div>
<p class="font-body-sm text-slate-600 text-[10px]">© 2024 Hypixel Studios Inc. All Rights Reserved. Managed Node.</p>
</footer>
</body></html>
